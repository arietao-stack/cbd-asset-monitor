name: Track assets (TikTok + sheet)

# Runs in the cloud — no need for your machine to be on.
# Pulls the latest links straight from the published Google Sheet, scrapes
# TikTok metrics, and commits the data files that the dashboard reads.
on:
  schedule:
    - cron: "0 1 * * *"     # 01:00 UTC = 08:00 Vietnam, every day
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed to commit refreshed data back to the repo

concurrency:
  group: track
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: pip install --upgrade yt-dlp

      - name: Fetch sheet links
        run: python scripts/fetch_sheet.py

      - name: Track TikTok
        run: python scripts/track_tiktok.py

      - name: Commit data
        run: |
          git config user.name  "cbd-tracker-bot"
          git config user.email "actions@github.com"
          git add docs/data/links.json docs/data/tiktok.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh TikTok + sheet $(date -u +%FT%TZ)"
            git push
          fi
